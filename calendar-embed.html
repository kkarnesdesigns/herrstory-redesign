<!--
  HERRSTORY EVENTS CALENDAR — Webflow Embed
  ──────────────────────────────────────────
  HOW TO USE IN WEBFLOW:
  1. Drop an Embed element on the page and paste this entire file's contents.
  2. Set the events proxy URL in the data-events-url attribute on the
     <section class="hs-cal"> element below. Default points at the Vercel
     deployment of this repo (api/eventbrite-events.js).
  3. Publish. The script fetches live HERRstory events from the proxy,
     renders the next 4 weeks, and shows details on click.

  Times display in America/New_York regardless of viewer location.

  Backend: api/eventbrite-events.js (Vercel serverless function)
  Required Vercel env var: EVENTBRITE_TOKEN
  Optional Vercel env var: EVENTBRITE_ORG_ID (skips org lookup)
-->

<style>
  .hs-cal {
    --ink:#1a050b; --maroon:#591C27; --rose:#A65E68;
    --blush:#F7F2F3; --white:#fff; --acid:#D4AF37;
    --line:rgba(26,5,11,0.12);
    --font-display:'Cormorant Garamond',serif;
    --font-sans:'DM Sans',sans-serif;
    --font-caps:'Lexend Giga',sans-serif;
    background:var(--blush); color:var(--ink);
    font-family:var(--font-sans); padding:4rem 2rem;
  }
  .hs-cal *{box-sizing:border-box;margin:0;padding:0}
  .hs-cal-wrap{max-width:1300px;margin:0 auto}
  .hs-cal-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:3rem;flex-wrap:wrap;gap:1rem}
  .hs-cal-label{font-family:var(--font-caps);font-size:.75rem;text-transform:uppercase;letter-spacing:.15em;font-weight:700;color:var(--rose);display:block;margin-bottom:.75rem}
  .hs-cal-title{font-family:var(--font-display);font-size:clamp(2.5rem,5vw,4rem);font-weight:400;line-height:1;letter-spacing:-.02em}
  .hs-cal-tz{font-family:var(--font-caps);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--rose)}

  .hs-cal-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:3rem;align-items:start}
  @media(max-width:900px){.hs-cal-grid{grid-template-columns:1fr}}

  .hs-cal-weeks{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line)}
  .hs-cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--white)}
  .hs-cal-dow span{padding:.85rem .5rem;font-family:var(--font-caps);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);text-align:center;font-weight:700}
  .hs-cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line)}
  .hs-cal-day{background:var(--white);min-height:92px;min-width:0;padding:.7rem;display:flex;flex-direction:column;gap:.4rem;cursor:default;position:relative;transition:background .2s;overflow:hidden}
  .hs-cal-day.has{cursor:pointer}
  .hs-cal-day.has:hover{background:#fdf8f9}
  .hs-cal-day.muted{background:#faf5f6;color:#bba}
  .hs-cal-day.today .hs-cal-num{color:var(--maroon);font-weight:700}
  .hs-cal-day.active{background:var(--maroon);color:var(--blush)}
  .hs-cal-day.active .hs-cal-num,.hs-cal-day.active .hs-cal-tag{color:var(--blush)}
  .hs-cal-day.active .hs-cal-dot{background:var(--acid)}
  .hs-cal-num{font-family:var(--font-display);font-size:1.3rem;line-height:1}
  .hs-cal-tag{font-family:var(--font-caps);font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--maroon);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;min-width:0}
  .hs-cal-dot{width:6px;height:6px;border-radius:50%;background:var(--maroon);position:absolute;top:.7rem;right:.7rem}

  .hs-cal-panel{background:var(--white);border:1px solid var(--line);padding:2.5rem;min-height:340px;position:sticky;top:2rem}
  .hs-cal-empty{font-family:var(--font-display);font-style:italic;font-size:1.4rem;color:var(--rose);line-height:1.4}
  .hs-cal-panel h3{font-family:var(--font-display);font-size:2rem;font-weight:400;line-height:1.1;letter-spacing:-.02em;margin:.75rem 0 1.25rem;color:var(--ink)}
  .hs-cal-meta{display:flex;flex-direction:column;gap:.6rem;padding:1.25rem 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:1.5rem}
  .hs-cal-meta div{display:flex;gap:.75rem;font-size:.9rem;color:#444}
  .hs-cal-meta strong{font-family:var(--font-caps);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--rose);min-width:70px;padding-top:2px}
  .hs-cal-details{font-size:1rem;line-height:1.65;color:#444;margin-bottom:1.75rem}
  .hs-cal-btn{display:inline-block;padding:1rem 2.25rem;background:var(--maroon);color:var(--white);font-family:var(--font-caps);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;border:1px solid var(--maroon);text-decoration:none;cursor:pointer;transition:all .3s}
  .hs-cal-btn:hover{background:transparent;color:var(--maroon)}
</style>

<section class="hs-cal" data-events-url="https://herrstory-redesign.vercel.app/api/eventbrite-events">
  <div class="hs-cal-wrap">
    <div class="hs-cal-head">
      <div>
        <span class="hs-cal-label">Upcoming</span>
        <h2 class="hs-cal-title">The next four weeks.</h2>
      </div>
      <span class="hs-cal-tz">All times Eastern</span>
    </div>

    <div class="hs-cal-grid">
      <div>
        <div class="hs-cal-dow">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="hs-cal-weeks" id="hs-cal-weeks"></div>
      </div>
      <aside class="hs-cal-panel" id="hs-cal-panel">
        <p class="hs-cal-empty">Loading events…</p>
      </aside>
    </div>
  </div>
</section>

<script>
(function(){
  var TZ='America/New_York';
  var root=document.querySelector('.hs-cal');
  var EVENTS_URL=root && root.dataset.eventsUrl;

  function ymdET(d){
    var f=new Intl.DateTimeFormat('en-CA',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit'});
    return f.format(d); // YYYY-MM-DD
  }
  function fmt(d,opts){return new Intl.DateTimeFormat('en-US',Object.assign({timeZone:TZ},opts)).format(d);}
  function todayET(){return ymdET(new Date());}

  var weeksEl=document.getElementById('hs-cal-weeks');
  var panel=document.getElementById('hs-cal-panel');

  function setPanel(html){panel.innerHTML=html;}

  function buildCalendar(events){
    var todayKey=todayET();
    var todayParts=todayKey.split('-').map(Number);
    var anchor=new Date(Date.UTC(todayParts[0],todayParts[1]-1,todayParts[2]));
    var dow=anchor.getUTCDay();
    anchor.setUTCDate(anchor.getUTCDate()-dow);

    weeksEl.innerHTML='';
    var firstEventKey=null;

    for(var w=0;w<4;w++){
      var weekEl=document.createElement('div');
      weekEl.className='hs-cal-week';
      for(var i=0;i<7;i++){
        var cur=new Date(anchor.getTime());
        cur.setUTCDate(cur.getUTCDate()+w*7+i);
        var key=cur.toISOString().slice(0,10);
        var ev=events[key];
        var cell=document.createElement('div');
        cell.className='hs-cal-day';
        if(ev){cell.classList.add('has');if(!firstEventKey)firstEventKey=key;}
        if(key===todayKey)cell.classList.add('today');
        cell.dataset.key=key;
        var num=document.createElement('div');
        num.className='hs-cal-num';
        num.textContent=cur.getUTCDate();
        cell.appendChild(num);
        if(ev){
          var dot=document.createElement('span');dot.className='hs-cal-dot';cell.appendChild(dot);
          var tag=document.createElement('div');tag.className='hs-cal-tag';tag.textContent=ev.type||ev.name;cell.appendChild(tag);
        }
        weekEl.appendChild(cell);
      }
      weeksEl.appendChild(weekEl);
    }

    function render(key){
      var ev=events[key];
      if(!ev){setPanel('<p class="hs-cal-empty">Select a highlighted day to see event details.</p>');return;}
      var dateStr=fmt(ev.date,{weekday:'long',month:'long',day:'numeric'});
      var timeStr=fmt(ev.date,{hour:'numeric',minute:'2-digit',timeZoneName:'short'});
      setPanel(
        '<span class="hs-cal-label">'+(ev.type||'Event')+'</span>'+
        '<h3>'+ev.name+'</h3>'+
        '<div class="hs-cal-meta">'+
          '<div><strong>Date</strong><span>'+dateStr+'</span></div>'+
          '<div><strong>Time</strong><span>'+timeStr+'</span></div>'+
          (ev.location?'<div><strong>Where</strong><span>'+ev.location+'</span></div>':'')+
        '</div>'+
        (ev.details?'<p class="hs-cal-details">'+ev.details+'</p>':'')+
        (ev.link?'<a class="hs-cal-btn" href="'+ev.link+'" target="_blank" rel="noopener">Register</a>':'')
      );
    }

    weeksEl.addEventListener('click',function(e){
      var cell=e.target.closest('.hs-cal-day.has');
      if(!cell)return;
      weeksEl.querySelectorAll('.hs-cal-day.active').forEach(function(c){c.classList.remove('active');});
      cell.classList.add('active');
      render(cell.dataset.key);
    });

    if(firstEventKey){
      var first=weeksEl.querySelector('[data-key="'+firstEventKey+'"]');
      if(first){first.classList.add('active');render(firstEventKey);}
    }else{
      setPanel('<p class="hs-cal-empty">No events in the next four weeks. Check back soon.</p>');
    }
  }

  function loadEvents(){
    if(!EVENTS_URL){
      setPanel('<p class="hs-cal-empty">Calendar misconfigured: missing data-events-url.</p>');
      return;
    }
    fetch(EVENTS_URL,{cache:'no-store'})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(data){
        var events={};
        (data.events||[]).forEach(function(e){
          if(!e.date)return;
          var d=new Date(e.date);
          if(isNaN(d))return;
          var key=ymdET(d);
          // If multiple events fall on the same ET day, keep the earliest.
          if(!events[key]||d<events[key].date){
            events[key]={
              name:e.name||'Untitled',
              date:d,
              type:e.type||'',
              location:e.location||'',
              link:e.link||'',
              details:e.details||''
            };
          }
        });
        buildCalendar(events);
      })
      .catch(function(err){
        console.error('Eventbrite load failed:',err);
        setPanel('<p class="hs-cal-empty">Couldn’t load events right now. Please refresh in a moment.</p>');
      });
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',loadEvents);
  }else{
    loadEvents();
  }
})();
</script>
